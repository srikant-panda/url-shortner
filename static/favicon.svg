<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="64" height="64" rx="14" ry="14" fill="url(#g1)"/>
  <!-- Scissors icon -->
  <g fill="none" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Top blade -->
    <line x1="36" y1="16" x2="18" y2="38"/>
    <!-- Bottom blade -->
    <line x1="36" y1="48" x2="18" y2="26"/>
    <!-- Top circle -->
    <circle cx="13" cy="16" r="5"/>
    <!-- Bottom circle -->
    <circle cx="13" cy="48" r="5"/>
    <!-- Tail lines -->
    <line x1="40" y1="16" x2="52" y2="16"/>
    <line x1="40" y1="48" x2="52" y2="48"/>
  </g>
</svg>
